on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: g++ -std=c++20 -Wall -Wextra -Werror -Wpedantic proga/debugger/lab3$/*.cpp -o lab3

  clang-format:
    runs-on: ubuntu-latest
    container: ghcr.io/cpp-linter/clang-tools:18
    steps:
    - uses: actions/checkout@v4
    - run: clang-format --dry-run -Werror proga/debugger/lab3$/*.cpp

  clang-tidy:
    runs-on: ubuntu-latest
    container: ghcr.io/cpp-linter/clang-tools:18
    steps:
    - uses: actions/checkout@v4
    - run: clang-tidy proga/debugger/lab3$/*.cpp